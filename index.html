<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIZZA</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #fff8f0;
}

header {
    background: #d62828;
    color: white;
    padding: 20px;
    text-align: center;
}

nav {
    background: #f77f00;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    text-decoration: none;
    margin: 0 15px;
    font-weight: bold;
}

.hero {
    background: url('https://images.unsplash.com/photo-1601924638867-3ec3b4f2d1d5') no-repeat center;
    background-size: cover;
    height: 300px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: bold;
}

.section {
    padding: 40px;
    text-align: center;
}

.pizza-box {
    display: inline-block;
    background: white;
    width: 250px;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.pizza-box img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #d62828;
    color: white;
    border: none;
    padding: 10px 20px;
    margin-top: 10px;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #9d0208;
}

footer {
    background: #003049;
    color: white;
    text-align: center;
    padding: 15px;
}
</style>
</head>
<body>

<header>
    <h1>🍕 PIZZA</h1>
    <p>Delicious & Fresh Pizza Everyday</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Menu</a>
    <a href="#">Order</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    Best Pizza In Town!
</div>

<div class="section">
    <h2>Our Menu</h2>

    <div class="pizza-box">
        <img src="https://images.unsplash.com/photo-1548365328-9f547fb0953b" alt="Margherita">
        <h3>Margherita</h3>
        <p>$8.99</p>
        <button>Order Now</button>
    </div>

    <div class="pizza-box">
        <img src="https://images.unsplash.com/photo-1594007654729-407eedc4be65" alt="Pepperoni">
        <h3>Pepperoni</h3>
        <p>$10.99</p>
        <button>Order Now</button>
    </div>

    <div class="pizza-box">
        <img src="https://images.unsplash.com/photo-1604382354936-07c5d9983bd3" alt="Veggie">
        <h3>Veggie Pizza</h3>
        <p>$9.99</p>
        <button>Order Now</button>
    </div>

</div>

<footer>
    © 2026 PIZZA | All Rights Reserved
</footer>

</body>
  </html>
